span{
    display:inline-block;
    transition:.2s;
    border:1px solid #999;
    border-radius:8px;
    padding:8px 15px;
    font-size: xx-small;
}

span:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 20px rgba(0,0,0,.35);
}









        .menu {
            font-family: "myfont";
            font-size: medium;
            width: 200px;
            background: #0194f0;
            border-left: 1px solid #aaa;
            padding: 5px;
            position: fixed;
        }

        .menu a {
            display: block;
            color: white;
            padding: 15px;
            text-decoration: none;
            font-weight: bolder;
        }

        .menu a:hover {
            background: #555555;
        }

        .vertical {
            right: 220px;
            
            top: 80px;

            width: 1px;
            height: 500px;
            border: 0px;
            border-left: 1px solid black;
            position: absolute;
        }

        .content {
            flex: 1;
            padding: 0 250px 0 10px;
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }


        .card{
            width: 100%;
            height: 50%;
            background: #eee;
            border-radius: 10px;
            padding: 10px;
            font-family: sans-serif;
            font-size: smaller;
        }

        .cardSearch{
            font-family: 'myfont';
            justify-content: center;
            align-items: center;
            width: 80%;
            height: 80%;
            background: #d2eeff;
            display: flex;
            gap: 50px;
            margin-bottom: 20px;
            margin-top: 20px;
            border: 1px solid #a1d2e5;
        }

        .tableBox {
            font-family: 'myfont';
            font-size: smaller;
            max-height: 50vh;
            overflow: auto;
        }

        button{
            background: #36a7e9a1;
            color: #FFF;
            padding: 10px;
            border-radius: 20px;
            border: 2px solid rgba(0, 165, 241, 0.151);
            font-family: 'myfont';
        }
        button:hover{
            background: #d3f8ffb8;
        }
        button:active{
            transform: scale(.90);
        }

        input {
            width: 50%;
            padding: 12px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 10px;
            outline: none;
        }

        input:focus {
            border-color: royalblue;
        }
        label{
            font-family: 'myfont' ,sans-serif;
            font-size: small;
        }

        body {
            margin: 0;
            font-family: "myfont";

        }






        table {
            width: 100%;
            border-collapse: collapse;
        }


        td {
            white-space: nowrap;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
        }


        tr:nth-child(even) {
            background: #ffffffe8;
        }

        tr:nth-child(odd) {
            background: #e8e6e6;
        }

        th {
            position: sticky;
            top: 0%;
            color: #ffffff;
            background: #007bffb3;
            z-index: 1;

        }



.cardEdit  {
   display: none;
 background: #555555e5;
    position: fixed;
    inset: 0;
    z-index: 999;    

   /* display: flex;*/
 
 
   gap: 5px;
    flex-direction: column;
    overflow-y: auto;
    align-items: center;
    
}
.cardMini {
    display: inherit;
    flex-direction: column;
    width: 400px;
    max-width: 95%;
    gap: 5px;
    background: #84c7f1e0;
    
    padding-right:10px;
    padding-left: 5px;
}

.cardMini input{
    width: 70%;    
}


/**********************************************************/


/***************************************************************************
/***************************************************************************
*****************************************************************************/


.sectionProducts{
    
    
    margin:0 30vw;
    display: flex;    
    flex-direction: column;

}


.cardNewProduct >*:not(hr,#MESSAGE){
    padding: 5px;
}  
    .cardNewProduct{
        
        flex-direction: column; 
        gap: 5px;
    
    
        width:max-content;
 
        background: #84c7f1e0;
    }
        
    


dialog::backdrop{
    background:rgba(0,0,0,.5);
    backdrop-filter:blur(5px);
}

dialog[open]{
   
   overflow:hidden;

    border:none;
    border-radius:15px;
   
    

}







@media (max-width: 650px) {

    body {
        display: flex;
        flex-direction: column;
    }

    .menu {
        position: static;
        width: 100%;
        box-sizing: border-box;
        display: flex;
        flex-direction: row;
        justify-content: stretch;
        padding: 0;
    }

    .menu hr {
        display: none;
    }

    .menu a {
        flex: 1;
        text-align: center;
        padding: 14px 8px;
        font-size: 14px;
    }

    .vertical {
        display: none;
    }

    .content {
        width: 100%;
        box-sizing: border-box;
        padding: 10px;
        flex-direction: column;
    }

    .cardSearch {
        display: flex;
        flex-direction: column;
        width: 100%;
        height: auto;
        gap: 10px;
        margin: 10px 0;
        padding: 15px;
        box-sizing: border-box;
    }

    .cardSearch div {
        width: 100%;
    }

    .cardSearch > div:last-child {
        width: 100%;
        text-align: center;
    }

    input {
        width: 100%;
        box-sizing: border-box;
    }

    .card {
        width: 100%;
        height: auto;
        box-sizing: border-box;
    }

    .tableBox {
        width: 100%;
        overflow-x: auto;
    }

    table {
        min-width: 800px;
    }

    .sectionProducts {
        width: 100%;
        margin: 0;
        padding: 10px;
        box-sizing: border-box;
    }

    .cardNewProduct {
        width: 95%;
        max-width: 100%;
    }

    dialog[open] {
        width: 95%;
        max-width: 100%;
    }

    #framePicture {
        width: 120px !important;
        height: 120px !important;
    }
}

                /***************************************************************************/


    </style>
   
</head>

    <div class="menu">
        <a href="#">خانه</a>
        <hr>
        <a id="btnOrders" href="#">سفارشات</a>
        <hr>
        <a id="btnProducts" href="#">محصولات</a>
    </div>

    <hr class="vertical">


    <section class="content" id="sectionOrders" style="display: none;">


        <div id="cardShowRecord" class="cardEdit">
            <div class="cardMini">

            <div><label>وضعیت سفارش</label><input id=" "></div>

<div style="display:inline-flex;margin-inline:20%;">

        <div class="card" >

<label>همچنین میتوانیدروی سطرموردنظرکلیک کنید</label>


                <table id="tableOrder">
                  
                    <thead>
                        <tr class="row">
                            <th>ردیف</th>

                    </thead>
                    
                    <tbody id="tableBody">
                    </tbody>
                </table>
            </div>



        </div>



    </section>




    
    <section id="sectionProducts" class="sectionProducts">
                    <div id="newProduct" onclick="newProduct();"><label style="cursor:pointer;background: black;color:white;font-weight: bold;">+  محصول جدید</label></div>

  
<dialog id="cardNewProduct" class="cardNewProduct">

            <div><label>کدمحصول</label><input id="inp_codeProductForAdd"></div>
            <div><label>قیمت</label><input id="inp_priceProductForAdd"></div>



            <div style="display:flex;gap: 5%;align-items: center;">

                    <img style="border-radius: 50% ;position:absolute;width:100%;height: auto;" id="picture">
