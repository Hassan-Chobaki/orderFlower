<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> تایید سفارش</title>
    <style>
        @font-face{
            font-family: "Pinar.woff2";
            src: url("Pinar") format("woff2");
        }

        body {
            font-family:"Pinar.woff2";
            background: linear-gradient(135deg,#ffdde1,#ee9ca7,#e7b8c5,#f8d4df);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: rgba(255,255,255,0.25);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 18px;
            padding: 30px;
            border: 1px solid rgba(46, 43, 43, 0.4);
            text-align: center;
            font-family:sans-serif;
            src: url("font/iranian-sans.woff");
        }
        h1 {
            color: #000000;
        }
        p {
            font-weight: 100;
            color: #555;
        }

        button{
  width:60%;
  margin-top:15px;
  padding:12px;
  border: 1px solid rgba(0, 0, 0, 0.4);
  border-radius:20px;
  background:#03760c8d;
  color:white;
  font-family: sans-serif;
  font-size:16px;
}

button:hover{
  background:#03760c;
  cursor:pointer;
}

button:active{

  box-shadow:0 0 0 4px rgba(120, 120, 120, 0.5);
 
}
button::after{
  background: #03760c8d;
  transform: translate(-50%, -50%) scale(0.95);
}

        .btnBack{
            margin-top: 20%;
            scale: 1.3;
            background: #09701e85;
            color: white;
            font-family: sans-serif;
            border:#000000 1px;
            border-radius: 10px;
            box-shadow: inset 0 0 0 rgb(209, 233, 174);
        }
*/
    </style>
</head>
<body>
    <div class="container">
        <h4 id="h4"></h4>
        <p id="p"> </p><span id="code" style="background-color: rgb(209, 233, 174) ;color: rgb(255, 0, 0);"></span>
<div>
        <button class="btnBack" type="button" onclick=location.href="index.html">بازگشت</button>
</div>

    </div>
<script>
const msg=new URLSearchParams(window.location.search).get("msg");

    if(msg==="register"){
     document.getElementById('h4').textContent="سفارش باموفقیت ثبت شد";
     document.getElementById('code').textContent=sessionStorage.getItem("orderCode");
     document.getElementById('p').textContent="کدپیگیری";
     
    }
    else if(msg==="cancel")
     document.getElementById('h4').textContent="سفارش باموفقیت لغو شد"

</script>
    
    </body>
</html>
